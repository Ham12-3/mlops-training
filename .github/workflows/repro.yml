# Verify pipeline reproducibility on every PR.
# CI does NOT use a DVC remote: .dvc/config is gitignored. The data stage
# generates data from sklearn, so we run the full pipeline from scratch and
# assert that two runs produce identical metrics and model hash.

name: Reproducibility check

on:
  pull_request:
    branches: [main, master]

jobs:
  repro-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      # No "dvc pull": no remote is configured in CI (config is gitignored).
      # Pipeline runs from scratch; data stage creates data/raw.csv from sklearn.

      - name: Run reproducibility check
        run: make repro-check
